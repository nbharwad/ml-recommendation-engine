# Prometheus Configuration for Recommendation System
# Scrape targets for all recommendation microservices

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ===== Recommendation Services =====
  
  - job_name: "recommendation-serving"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["recommendation"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: recommendation-serving
        action: keep
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        target_label: __address__
        regex: (.+)
        replacement: ${1}
  
  - job_name: "feature-store"
    static_configs:
      - targets: ["feature-store:9090"]
    metrics_path: /metrics
  
  - job_name: "retrieval"
    static_configs:
      - targets: ["retrieval:9091"]
  
  - job_name: "ranking"
    static_configs:
      - targets: ["ranking:9092"]
  
  - job_name: "ingestion"
    static_configs:
      - targets: ["ingestion:9093"]
  
  # ===== Infrastructure =====
  
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
  
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]
  
  - job_name: "milvus"
    static_configs:
      - targets: ["milvus-standalone:9091"]
  
  # ===== Kubernetes =====
  
  - job_name: "kubernetes-nodes"
    kubernetes_sd_configs:
      - role: node
  
  - job_name: "kubernetes-pods"
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
