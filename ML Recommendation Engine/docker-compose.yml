# ============================================================================
# Docker Compose — Local Development Environment
# Provides full recommendation stack for local development and testing
# ============================================================================

version: "3.9"

services:
  # ===== Core Services =====
  
  recommendation-serving:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.serving
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - WORKERS=2
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FEATURE_SERVICE_HOST=feature-store
      - FEATURE_SERVICE_PORT=50051
      - RETRIEVAL_SERVICE_HOST=retrieval
      - RETRIEVAL_SERVICE_PORT=50052
      - RANKING_SERVICE_HOST=ranking
      - RANKING_SERVICE_PORT=50053
      - OTEL_EXPORTER_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      - feature-store
      - retrieval
      - redis
    networks:
      - rec-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
  
  feature-store:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.serving  # shared base
    command: ["python", "feature_service.py"]
    ports:
      - "50051:50051"
      - "9090:9090"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GRPC_PORT=50051
    depends_on:
      - redis
    networks:
      - rec-network
  
  retrieval:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.serving
    command: ["python", "retrieval_service.py"]
    ports:
      - "50052:50052"
      - "9091:9091"
    environment:
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - GRPC_PORT=50052
    depends_on:
      - milvus-standalone
    networks:
      - rec-network
  
  ranking:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.serving
    command: ["python", "ranking_service.py"]
    ports:
      - "50053:50053"
      - "9092:9092"
    environment:
      - GRPC_PORT=50053
    networks:
      - rec-network
  
  # ===== Data Infrastructure =====
  
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-lfu"]
    volumes:
      - redis-data:/data
    networks:
      - rec-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  
# ⚠️ LOCAL DEVELOPMENT ONLY — Production uses AWS MSK with SASL/IAM
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:SASL_PLAINTEXT,HOST:SASL_PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,HOST://localhost:29092"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:29092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_SASL_MECHANISM_INTER_BROKER_THRESHOLD: "PLAIN"
      KAFKA_SASL_ENABLED_MECHANISMS: "PLAIN"
      KAFKA_LISTENER_NAME_HOST_VIRTUAL_HOST_MEMORY_BROKER: ""
      KAFKA_LISTENER_NAME_CONTROLLER_VIRTUAL_HOST_MEMORY_BROKER: "CONTROLLER"
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      KAFKA_SUPER_USERS: "User:kafkauser"
      CLUSTER_ID: "recommendation-system-dev"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - ./infrastructure/docker/kafka/kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro
      - kafka-data:/var/lib/kafka
    networks:
      - rec-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
  
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:9092"
    depends_on:
      - kafka
    networks:
      - rec-network
  
  # Milvus (vector database for ANN search)
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: ["etcd", "-listen-peer-urls=http://0.0.0.0:2380", "-listen-client-urls=http://0.0.0.0:2379", "-advertise-client-urls=http://etcd:2379"]
    volumes:
      - etcd-data:/etcd
    networks:
      - rec-network
  
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    command: ["minio", "server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    networks:
      - rec-network
  
  milvus-standalone:
    image: milvusdb/milvus:v2.4.13
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus-data:/var/lib/milvus
    networks:
      - rec-network
  
  milvus-init:
    image: python:3.11-slim
    depends_on:
      milvus-standalone:
        condition: service_healthy
    command: >
      sh -c "pip install pymilvus && python -c \"
      import time; time.sleep(10);
      from pymilvus import connections, Collection, CollectionSchema, FieldSchema, DataType, utility;
      connections.connect(host='milvus-standalone', port='19530');
      if not utility.has_collection('item_embeddings'):
          fields = [FieldSchema('id', DataType.INT64, is_primary=True),
                   FieldSchema('embedding', DataType.FLOAT_VECTOR, dim=128)];
          schema = CollectionSchema(fields, 'item_embeddings');
          col = Collection('item_embeddings', schema);
          index_params = {'index_type': 'HNSW', 'metric_type': 'L2', 'params': {'M': 16, 'efConstruction': 256}};
          col.create_index('embedding', index_params);
          col.load();
          print('Created item_embeddings collection');
      else:
          print('Collection item_embeddings already exists');
      \"
    networks:
      - rec-network
  
  # ===== Observability =====
  
  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - rec-network
  
  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rec-network
  
  jaeger:
    image: jaegertracing/all-in-one:1.62
    ports:
      - "16686:16686"   # UI
      - "14268:14268"   # HTTP collector
      - "6831:6831/udp" # UDP agent
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - rec-network

volumes:
  redis-data:
  kafka-data:
  etcd-data:
  minio-data:
  milvus-data:
  prometheus-data:
  grafana-data:

networks:
  rec-network:
    driver: bridge
