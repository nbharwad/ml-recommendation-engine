# ============================================================================
# Docker Compose — Local Development Environment
# Provides full recommendation stack for local development and testing
# ============================================================================

version: "3.9"

services:
  # ===== Core Services =====
  
  recommendation-serving:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.serving
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - WORKERS=2
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FEATURE_SERVICE_HOST=feature-store
      - FEATURE_SERVICE_PORT=50051
      - RETRIEVAL_SERVICE_HOST=retrieval
      - RETRIEVAL_SERVICE_PORT=50052
      - RANKING_SERVICE_HOST=ranking
      - RANKING_SERVICE_PORT=50053
      - OTEL_EXPORTER_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      - redis
    networks:
      - rec-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
  
  feature-store:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.serving  # shared base
    command: ["python", "feature_service.py"]
    ports:
      - "50051:50051"
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - rec-network
  
  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rec-network
  
  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"   # UI
      - "14268:14268"   # HTTP collector
      - "6831:6831/udp" # UDP agent
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - rec-network

volumes:
  redis-data:
  kafka-data:
  etcd-data:
  minio-data:
  milvus-data:
  prometheus-data:
  grafana-data:

networks:
  rec-network:
    driver: bridge
