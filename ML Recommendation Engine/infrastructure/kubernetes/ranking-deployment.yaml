# ============================================================================
# Kubernetes Manifests — Ranking Service (GPU)
# GPU node deployment with Triton sidecar
# ============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranking-service
  namespace: recommendation
  labels:
    app: ranking-service
    component: ranking
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # zero downtime for GPU pods (expensive)
  selector:
    matchLabels:
      app: ranking-service
  template:
    metadata:
      labels:
        app: ranking-service
        component: ranking
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9092"
    spec:
      serviceAccountName: ranking-service
      terminationGracePeriodSeconds: 60  # longer for GPU cleanup
      
      # Schedule on GPU nodes
      nodeSelector:
        nvidia.com/gpu.present: "true"
        node.kubernetes.io/instance-type: "g5.2xlarge"  # A10G GPU
      
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      
      containers:
        # Primary: Ranking application
        - name: ranking
          image: ${ECR_REGISTRY}/ranking-service:${IMAGE_TAG}
          ports:
            - containerPort: 50053
              name: grpc
            - containerPort: 9092
              name: metrics
          
          env:
            - name: TRITON_HOST
              value: "localhost"  # Triton runs as sidecar
            - name: TRITON_PORT
              value: "8001"
            - name: XGBOOST_MODEL_PATH
              value: "/models/xgboost_baseline.json"
          
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          
          readinessProbe:
            grpc:
              port: 50053
            periodSeconds: 5
            failureThreshold: 3
          
          livenessProbe:
            grpc:
              port: 50053
            periodSeconds: 10
            failureThreshold: 3
          
          volumeMounts:
            - name: model-store
              mountPath: /models
        
        # Sidecar: NVIDIA Triton Inference Server
        - name: triton
          image: nvcr.io/nvidia/tritonserver:24.10-py3
          args:
            - tritonserver
            - --model-repository=/models/triton-repo
            - --strict-model-config=true
            - --log-verbose=0
            - --grpc-port=8001
            - --http-port=8000
            - --metrics-port=8002
          
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: 8002
              name: triton-metrics
          
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          
          volumeMounts:
            - name: model-store
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
      
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: model-store-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ranking
  namespace: recommendation
spec:
  type: ClusterIP
  ports:
    - port: 50053
      targetPort: 50053
      name: grpc
    - port: 9092
      targetPort: 9092
      name: metrics
  selector:
    app: ranking-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ranking-hpa
  namespace: recommendation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ranking-service
  minReplicas: 4
  maxReplicas: 16
  metrics:
    - type: Pods
      pods:
        metric:
          name: ranking_gpu_utilization_percent
        target:
          type: AverageValue
          averageValue: "70"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600  # 10 min cool-down (GPU pods are expensive to recreate)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ranking-pdb
  namespace: recommendation
spec:
  maxUnavailable: 1  # strict: only 1 GPU pod can be down at a time
  selector:
    matchLabels:
      app: ranking-service
