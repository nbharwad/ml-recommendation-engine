apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: serving-egress
  namespace: recommendation
spec:
  podSelector:
    matchLabels:
      app: recommendation-serving
  policyTypes: [Egress]
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: feature-store
  - to:
    - podSelector:
        matchLabels:
          app: retrieval-service
  - to:
    - podSelector:
        matchLabels:
          app: ranking-service
  - to:
    - podSelector:
        matchLabels:
          app: reranking-service