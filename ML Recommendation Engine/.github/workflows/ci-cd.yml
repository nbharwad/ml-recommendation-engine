# ============================================================================
# CI/CD Pipeline — GitHub Actions
# Lint → Test → Build → Push → Deploy (GitOps via ArgoCD)
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ===== Stage 1: Lint & Static Analysis =====
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      
      - name: Install lint dependencies
        run: |
          pip install ruff mypy black isort
      
      - name: Ruff lint
        run: ruff check services/ ml/ streaming/ --output-format=github
      
      - name: Black formatting check
        run: black --check services/ ml/ streaming/
      
      - name: isort import ordering
        run: isort --check-only services/ ml/ streaming/
      
      - name: MyPy type checking
        run: mypy services/ --ignore-missing-imports --no-error-summary

  # ===== Stage 2: Unit Tests =====
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          pip install -r services/serving/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=services \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unit-tests
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ===== Stage 3: Integration Tests =====
  integration-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Compose
        run: |
          docker compose up -d redis kafka milvus-standalone
          # Wait for Kafka to be ready with health check
          timeout 120 bash -c 'until docker exec kafka kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null; do sleep 5; done' || echo "Kafka health check failed, continuing anyway"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: pip install -r services/serving/requirements.txt pytest httpx
      
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --timeout=120
        env:
          REDIS_HOST: localhost
          KAFKA_BOOTSTRAP: localhost:29092
          MILVUS_HOST: localhost
      
      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ===== Stage 4: Build & Push Docker Images =====
  build:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - name: serving
            dockerfile: infrastructure/docker/Dockerfile.serving
          - name: feature-store
            dockerfile: infrastructure/docker/Dockerfile.serving
          - name: retrieval
            dockerfile: infrastructure/docker/Dockerfile.serving
          - name: ranking
            dockerfile: infrastructure/docker/Dockerfile.ranking
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ECR_REGISTRY }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ===== Stage 5: Deploy to Staging =====
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Update K8s manifests with new image tag
        run: |
          cd infrastructure/kubernetes
          # Use envsubst for proper template variable substitution
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          export ECR_REGISTRY=${{ env.ECR_REGISTRY }}
          for file in *-deployment.yaml; do
            envsubst < "$file" > "$file.tmp" && mv "$file.tmp" "$file"
          done
      
      - name: Commit manifest updates (GitOps)
        run: |
          git config user.email "ci@recommendation-system.com"
          git config user.name "CI Bot"
          git add infrastructure/kubernetes/
          git commit -m "Deploy ${{ env.IMAGE_TAG }} to staging" || true
          git push origin main
      
      # ArgoCD will detect the manifest change and deploy automatically
      
      - name: Wait for ArgoCD sync
        run: |
          echo "ArgoCD will auto-sync. Waiting 60s for deployment..."
          sleep 60
      
      - name: Smoke test staging
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}"
          curl -sf "$STAGING_URL/health" | jq .
          
          # Test recommendation endpoint with schema validation
          RESPONSE=$(curl -sf -X POST "$STAGING_URL/v1/recommendations" \
            -H "Content-Type: application/json" \
            -d '{"user_id": "smoke_test_user", "num_items": 5}')
          echo "$RESPONSE" | jq .
          # Validate response schema
          echo "$RESPONSE" | jq -e '.recommendations | length > 0' || exit 1

  # ===== Stage 6: Deploy to Production (Manual Approval) =====
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production  # requires manual approval
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production (canary 5%)
        run: |
          echo "Deploying ${{ env.IMAGE_TAG }} to production (canary 5%)"
          # ArgoCD canary deployment via Argo Rollouts
      
      - name: Monitor canary (5 minutes)
        run: |
          echo "Monitoring canary metrics..."
          sleep 300
          # Prometheus queries for canary validation
          # NOTE: Requires Prometheus at http://prometheus:9090
          #PROMETHEUS="http://prometheus:9090"
          # Check p99 latency < 100ms
          #curl -s "$PROMETHEUS/api/v1/query?query=$(echo 'histogram_quantile(0.99,rate(recommendation_request_latency_ms_bucket[5m]))' | jq -r ...)
          # Check error rate < 1%
          #curl -s "$PROMETHEUS/api/v1/query?query=$(echo 'sum(rate(recommendation_request_total{status!="success"}[5m]))/sum(rate(recommendation_request_total[5m]))' | jq -r ...)
          # If metrics exceed thresholds, fail the deployment
          #exit 1
      
      - name: Promote to full production
        run: |
          echo "Promoting to 100% traffic"
          # ArgoCD promote rollout
